# ============================================================
# UNDERCITY — DEV OVERRIDES
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# NOTE: nginx disabled in dev — frontend uses Vite dev server
#       backend accessed directly on localhost:5000
# ============================================================

services:

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    environment:
      NODE_ENV: development
    ports:
      - "${PORT:-5000}:${PORT:-5000}"

  nginx:
    profiles:
      - nginx
