# ============================================================
# UNDERCITY — DOCKER COMPOSE BASE
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: undercity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-undercity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-undercity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # BUG FIX: no ports in base — dev override adds them, prod keeps them closed
    # Redis and Postgres should never be exposed on host by default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-undercity} -d ${POSTGRES_DB:-undercity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: undercity_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-devredis}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - redis_data:/data
    # BUG FIX: no ports in base — dev override adds 6380:6379
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD:-devredis} redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: undercity_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PORT:           ${PORT:-5000}
      # BUG FIX: DATABASE_URL uses DATABASE_SSL env var instead of hardcoded sslmode=disable
      # Set DATABASE_SSL=true in .env if using managed Postgres with SSL required
      DATABASE_URL:   postgresql://${POSTGRES_USER:-undercity}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-undercity}
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    volumes:
      - backup_data:/app/backups
      # BUG FIX: firebase service account only mounted if file exists
      # In production: use FIREBASE_SERVICE_ACCOUNT_JSON env var instead
      # The :ro mount with conditional existence prevents Docker creating a directory
    # BUG FIX: use curl for healthcheck — not node (saves ~50MB per check on VPS)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-5000}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - frontend_net
      - backend_net

  nginx:
    image: nginx:1.25-alpine
    container_name: undercity_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true
