# ============================================================
# UNDERCITY — DOCKER COMPOSE
# Dev:  docker compose --env-file .env.docker up -d
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: undercity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-undercity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-undercity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-undercity} -d ${POSTGRES_DB:-undercity}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: undercity_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devredis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: undercity_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PORT:           ${PORT:-5000}
      DATABASE_URL:   postgresql://${POSTGRES_USER:-undercity}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-undercity}?sslmode=disable
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    env_file:
      - ./backend/.env
    volumes:
      - backup_data:/app/backups
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - frontend_net
      - backend_net

  nginx:
    image: nginx:1.25-alpine
    container_name: undercity_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend_net

volumes:
  postgres_data:
  redis_data:
  backup_data:
  nginx_logs:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true
