# ============================================================
# UNDERCITY — GITLEAKS CONFIG
# Extends default rules + adds custom allowlist
# ============================================================

title = "Undercity Gitleaks Config"

[extend]
useDefault = true

# ── Allowlist ────────────────────────────────────────────
[allowlist]
description = "Global allowlist for Undercity"

paths = [
  # Build artifacts (compiled JS contains expected public keys)
  '''dist/.*''',
  '''build/.*''',
  '''.*\.next/.*''',
  '''coverage/.*''',

  # Dependencies
  '''node_modules/.*''',

  # Local env files (already gitignored, never pushed)
  '''.*\.env$''',
  '''.*\.env\..*''',
  '''!.*\.env\.example$''',

  # Lock files
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
  '''yarn\.lock''',

  # Test files (often have placeholder credentials)
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
  '''.*\.spec\.ts$''',
  '''__tests__/.*''',

  # Documentation
  '''docs/.*''',
  '''.*\.md$''',

  # Generated artifacts
  '''.*\.sarif$''',
  '''.*\.lock$''',
]

regexes = [
  # Test placeholders (never real keys)
  '''sk_test_placeholder''',
  '''pk_test_placeholder''',
  '''whsec_test_placeholder''',
  '''test_lemon_api_key_placeholder''',
  '''test_store_id_placeholder''',
  '''test_lemon_webhook_placeholder''',
  '''dev-salt-change-in-production-minimum-32-chars''',
  '''dev-fingerprint-salt-change-in-prod''',

  # Cloudflare Turnstile public test keys
  '''1x0000000000000000000000000000000AA''',
  '''2x0000000000000000000000000000000AA''',
  '''3x0000000000000000000000000000000FF''',

  # Firebase Web API keys are PUBLIC by design
  # https://firebase.google.com/docs/projects/api-keys
  # Protected via HTTP referrer restrictions + Firebase Security Rules
  '''AIzaSy[A-Za-z0-9_-]{33}''',
]

commits = []
