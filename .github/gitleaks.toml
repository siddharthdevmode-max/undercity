# ============================================================
# UNDERCITY — GITLEAKS CONFIG
# Extends default rules + adds custom allowlist
# ============================================================

title = "Undercity Gitleaks Config"

# Use all built-in gitleaks rules as the baseline
[extend]
useDefault = true

# ── Allowlist ────────────────────────────────────────────
# Files / patterns that should never trigger a leak alert
[allowlist]
description = "Global allowlist for Undercity"

paths = [
  '''node_modules/.*''',
  '''dist/.*''',
  '''build/.*''',
  '''coverage/.*''',
  '''\.next/.*''',
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
  '''yarn\.lock''',
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
  '''.*\.spec\.ts$''',
  '''__tests__/.*''',
  '''docs/.*''',
  '''.*\.md$''',
]

regexes = [
  # Test placeholders are safe — never real keys
  '''sk_test_placeholder''',
  '''pk_test_placeholder''',
  '''whsec_test_placeholder''',
  '''test_lemon_api_key_placeholder''',
  '''test_store_id_placeholder''',
  '''test_lemon_webhook_placeholder''',
  '''dev-salt-change-in-production-minimum-32-chars''',
  '''dev-fingerprint-salt-change-in-prod''',

  # Cloudflare Turnstile test keys (publicly documented test bypass)
  '''1x0000000000000000000000000000000AA''',
  '''2x0000000000000000000000000000000AA''',
  '''3x0000000000000000000000000000000FF''',

  # Firebase Web API keys are public by design (protected via referrer + Firebase rules)
  # https://firebase.google.com/docs/projects/api-keys
  '''AIzaSy[A-Za-z0-9_-]{33}''',
]

commits = [
  # Add commit SHAs here to ignore historical findings
]
