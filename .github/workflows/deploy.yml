# ════════════════════════════════════════════════════════════
# UNDERCITY DEPLOY PIPELINE
# Deploys on push to main ONLY after CI passes
# Backend → Docker Hub
# Frontend → Cloudflare Pages
# ════════════════════════════════════════════════════════════

name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time — never cancel in progress
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ─── Run CI first ─────────────────────────────────────────
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  # ─── Backend Docker Image ──────────────────────────────────
  deploy-backend:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          push:      true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/undercity-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/undercity-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          npm ci
          npm run migrate

      - name: Smoke test
        run: |
          sleep 10
          curl -f ${{ secrets.VITE_API_URL }}/api/health || exit 1

  # ─── Frontend Cloudflare Pages ─────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [ci]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL:               ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY:      ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:  ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:   ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID:       ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_TURNSTILE_SITE_KEY:    ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:     ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:    ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName:  undercity
          directory:    frontend/dist
          gitHubToken:  ${{ secrets.GITHUB_TOKEN }}
