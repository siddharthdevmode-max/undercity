name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Backend — Lint, Build, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     undercity_user
          POSTGRES_PASSWORD: undercity_test
          POSTGRES_DB:       undercity_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV:        test
      DATABASE_URL:    postgresql://undercity_user:undercity_test@localhost:5432/undercity_test
      REDIS_HOST:      127.0.0.1
      REDIS_PORT:      6379
      ALLOWED_ORIGINS: http://localhost:5173
      ADMIN_UIDS:      test-admin-uid
      LOG_LEVEL:       error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run database migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://undercity_user:undercity_test@localhost:5432/undercity_test

      - name: Unit tests
        run: npm test

      - name: Unit test coverage
        run: npm run test:coverage

      - name: Integration tests
        run: npm run test:integration

  frontend:
    name: Frontend — Lint, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_URL:               https://api.undercity.online/api
          VITE_FIREBASE_API_KEY:      placeholder
          VITE_FIREBASE_AUTH_DOMAIN:  placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:   placeholder
          VITE_FIREBASE_APP_ID:       placeholder
        run: npm run build
