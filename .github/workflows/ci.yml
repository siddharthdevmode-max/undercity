# ════════════════════════════════════════════════════════════
#  🔥 UNDERCITY CI/CD PIPELINE
#  UAC 2.0 — Launch Grade
#  Last updated: 2026-06
#  DO NOT MODIFY without reading docs/SECURITY.md first
# ════════════════════════════════════════════════════════════

name: 🔥 Undercity CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "20"
  API_URL: https://api.undercity.app
  FRONTEND_URL: https://undercity.app
  IMAGE_NAME: ${{ github.repository }}/undercity-backend

jobs:

  # ──────────────────────────────────────────────────────────
  # LAYER 1 — SECRET & SUPPLY CHAIN SECURITY
  # ──────────────────────────────────────────────────────────

  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Gitleaks — Full history scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: 🔎 Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔎 Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ──────────────────────────────────────────────────────────
  # LAYER 2 — STATIC ANALYSIS & SECURITY SCANNING
  # ──────────────────────────────────────────────────────────

  semgrep:
    name: 🛡️ Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan]
    permissions:
      security-events: write
      contents: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🛡️ Semgrep Scan
        run: |
          semgrep ci \
            --config p/nodejs \
            --config p/typescript \
            --config p/jwt \
            --config p/sql-injection \
            --config p/xss \
            --config p/express \
            --config p/secrets \
            --sarif --output=semgrep.sarif || true
        env:
          SEMGREP_RULES: >-
            p/nodejs
            p/typescript
            p/jwt
            p/sql-injection
            p/xss
            p/express
            p/secrets

      - name: 📤 Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [secret-scan]
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔬 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config: |
            paths:
              - backend/src
              - frontend/src
            paths-ignore:
              - "**/node_modules"
              - "**/dist"
              - "**/build"
              - "**/coverage"
              - "**/*.test.ts"
              - "**/*.test.tsx"
              - "**/__tests__/**"

      - name: 🔬 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  # ──────────────────────────────────────────────────────────
  # LAYER 3 — BACKEND TEST SUITE
  # ──────────────────────────────────────────────────────────

  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [secret-scan]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: undercity_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: backend
        run: npm ci

      - name: 🔍 TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: 🔍 Lint
        working-directory: backend
        run: npm run lint

      - name: 🔍 npm audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: 🔍 License check
        working-directory: backend
        run: >
          npx --no-install license-checker
          --production
          --onlyAllow
          'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0;MPL-2.0;CC-BY-3.0;(BSD-3-Clause OR GPL-2.0);(MIT AND CC-BY-3.0)'
          --excludePrivatePackages

      - name: 🗄️ Run migrations
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/undercity_test
        run: npm run migrate

      - name: 🧪 Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/undercity_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: npm run test:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          artifact-name: backend-sbom.spdx.json
          output-file: ./backend-sbom.spdx.json

  # ──────────────────────────────────────────────────────────
  # LAYER 4 — FRONTEND TEST SUITE
  # ──────────────────────────────────────────────────────────

  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [secret-scan]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 🔍 Lint
        working-directory: frontend
        run: npm run lint

      - name: 🔍 npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: 🔍 License check
        working-directory: frontend
        run: >
          npx license-checker
          --production
          --onlyAllow
          'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0;MPL-2.0;CC-BY-3.0;(BSD-3-Clause OR GPL-2.0);(MIT AND CC-BY-3.0)'
          --excludePrivatePackages

      - name: 🧪 Run tests
        working-directory: frontend
        run: npm run test

      - name: 🏗️ Production build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.API_URL }}/api
        run: npm run build

      - name: 📦 Bundle size guard
        working-directory: frontend
        run: |
          JS_SIZE=$(find dist/assets -name "*.js" -not -name "*.map" -exec du -ck {} + | tail -1 | cut -f1)
          CSS_SIZE=$(find dist/assets -name "*.css" -exec du -ck {} + | tail -1 | cut -f1)
          JS_SIZE=${JS_SIZE:-0}
          CSS_SIZE=${CSS_SIZE:-0}
          TOTAL=$((JS_SIZE + CSS_SIZE))
          echo "📦 JS: ${JS_SIZE}KB | CSS: ${CSS_SIZE}KB | Total: ${TOTAL}KB"
          if [ "$TOTAL" -gt 5120 ]; then
            echo "❌ JS+CSS bundle too large: ${TOTAL}KB (limit: 5120KB)"
            exit 1
          fi
          echo "✅ Bundle size OK: ${TOTAL}KB"

  # ──────────────────────────────────────────────────────────
  # LAYER 5 — CONTAINER SECURITY
  # ──────────────────────────────────────────────────────────

  trivy-scan:
    name: 🐳 Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-test]
    permissions:
      security-events: write
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🐳 Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          load: true
          tags: undercity-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Trivy — Container scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: undercity-backend:scan
          format: sarif
          output: trivy-container.sarif
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db

      - name: 🔍 Trivy — Filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db

      - name: 📤 Upload container scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-container.sarif') != ''
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

      - name: 📤 Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ──────────────────────────────────────────────────────────
  # LAYER 6 — DEVELOP BRANCH GATE
  # ──────────────────────────────────────────────────────────

  validate-develop:
    name: 🔒 Validate Develop Branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-test, frontend-test, trivy-scan, codeql, semgrep]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: ✅ Develop branch is clean
        run: |
          echo "══════════════════════════════════════"
          echo "  ✅ DEVELOP BRANCH VALIDATED"
          echo "  All checks passed. Safe to merge."
          echo "══════════════════════════════════════"
          echo "  Commit : ${{ github.sha }}"
          echo "  Author : ${{ github.actor }}"
          echo "  Time   : $(date -u)"
          echo "══════════════════════════════════════"

  # ──────────────────────────────────────────────────────────
  # LAYER 7 — PRODUCTION DEPLOY (Gated by repo variable)
  # ──────────────────────────────────────────────────────────
  # To enable deploy: Settings → Secrets and variables → Actions
  #   → Variables tab → New repository variable
  #   → Name: DEPLOY_ENABLED, Value: true
  # ──────────────────────────────────────────────────────────

  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test, frontend-test, trivy-scan, codeql, semgrep]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🚀 Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "══════════════════════════════════════"
            echo "  🚀 UNDERCITY DEPLOY STARTING"
            echo "  Commit : ${{ github.sha }}"
            echo "  Author : ${{ github.actor }}"
            echo "  Time   : $(date -u)"
            echo "══════════════════════════════════════"

            cd /opt/undercity

            PREV_COMMIT=$(git rev-parse HEAD)
            echo "📸 Rollback point: $PREV_COMMIT"
            echo $PREV_COMMIT > /opt/undercity/.last_good_commit

            echo "📥 Pulling latest code..."
            git pull origin main

            cd backend
            echo "📦 Installing production deps..."
            npm ci --omit=dev

            echo "🏗️  Building..."
            npm run build

            echo "🗄️  Running migrations..."
            npm run migrate

            echo "♻️  Restarting service..."
            pm2 restart undercity-backend --update-env

            echo "⏳ Waiting for service to stabilize..."
            sleep 8

            echo "🏥 Running health check..."
            MAX_RETRIES=3
            RETRY=0
            HEALTHY=false

            while [ $RETRY -lt $MAX_RETRIES ]; do
              HEALTH_STATUS=$(curl -sf \
                --max-time 10 \
                ${{ env.API_URL }}/health \
                | jq -r '.status' 2>/dev/null || echo "FAIL")

              if [ "$HEALTH_STATUS" = "ok" ]; then
                HEALTHY=true
                break
              fi

              RETRY=$((RETRY + 1))
              echo "⚠️  Health check attempt $RETRY/$MAX_RETRIES failed..."
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ Health check failed after $MAX_RETRIES attempts"
              echo "⏪ Rolling back to $PREV_COMMIT..."
              git checkout $PREV_COMMIT
              npm ci --omit=dev
              npm run build
              pm2 restart undercity-backend --update-env
              echo "⏪ Rollback complete"
              exit 1
            fi

            echo "══════════════════════════════════════"
            echo "  ✅ DEPLOY SUCCESSFUL"
            echo "══════════════════════════════════════"

      - name: ✅ Notify — Deploy success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload: |
            {
              "text": "✅ *Undercity Deployed Successfully*\n> Commit: `${{ github.sha }}`\n> By: ${{ github.actor }}\n> <${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: ❌ Notify — Deploy failed
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload: |
            {
              "text": "❌ *Undercity Deploy FAILED*\n> Commit: `${{ github.sha }}`\n> By: ${{ github.actor }}\n> <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────
  # LAYER 8 — POST-DEPLOY SMOKE TESTS (Gated)
  # ──────────────────────────────────────────────────────────

  smoke-test:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-backend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: 🏥 Health endpoint
        run: |
          echo "Checking ${{ env.API_URL }}/health..."
          RESPONSE=$(curl -sf --max-time 10 ${{ env.API_URL }}/health)
          echo "Response: $RESPONSE"
          STATUS=$(echo $RESPONSE | jq -r '.status')
          if [ "$STATUS" != "ok" ]; then
            echo "❌ Health check returned: $STATUS"
            exit 1
          fi
          echo "✅ Health OK"

      - name: 🔐 Auth endpoint reachable
        run: |
          echo "Checking auth endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            ${{ env.API_URL }}/api/auth/status)
          echo "Auth returned: $STATUS"
          if [[ "$STATUS" == 5* ]]; then
            echo "❌ Auth endpoint returning server error: $STATUS"
            exit 1
          fi
          echo "✅ Auth endpoint OK: $STATUS"

      - name: 🍯 Honeypot integrity check
        run: |
          echo "Verifying honeypot traps are active..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            ${{ env.API_URL }}/api/admin/users)
          echo "Honeypot returned: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "❌ CRITICAL: Honeypot returned 200 — auth layer broken"
            exit 1
          fi
          echo "✅ Honeypot OK: $STATUS"

      - name: 🌐 Frontend reachable
        run: |
          echo "Checking frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            ${{ env.FRONTEND_URL }})
          echo "Frontend returned: $STATUS"
          if [[ "$STATUS" == 5* ]] || [ "$STATUS" = "000" ]; then
            echo "❌ Frontend not reachable: $STATUS"
            exit 1
          fi
          echo "✅ Frontend OK: $STATUS"

      - name: 🛡️ Rate limiter active
        run: |
          echo "Testing rate limiter..."
          RATE_LIMITED=false
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 \
              ${{ env.API_URL }}/api/auth/status)
            if [ "$STATUS" = "429" ]; then
              RATE_LIMITED=true
              echo "✅ Rate limiter triggered at request $i"
              break
            fi
          done
          if [ "$RATE_LIMITED" = "false" ]; then
            echo "⚠️  Rate limiter did not trigger in 20 requests"
            echo "    This may be OK if limit is set high"
          fi

      - name: ❌ Notify — Smoke tests failed
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload: |
            {
              "text": "💨❌ *Smoke Tests FAILED — Production May Be Down*\n> Commit: `${{ github.sha }}`\n> By: ${{ github.actor }}\n> <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\n> *ACTION REQUIRED: Check production immediately*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: ✅ Notify — All smoke tests passed
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload: |
            {
              "text": "💨✅ *Smoke Tests Passed — Undercity Is Live*\n> Commit: `${{ github.sha }}`\n> Health ✅ | Auth ✅ | Honeypot ✅ | Frontend ✅ | Rate Limiter ✅"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
