name: 🔥 Undercity CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:

  # ── Secret Scanning ──────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Backend Tests ────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: [secret-scan]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       undercity_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend deps
        working-directory: backend
        run: npm ci

      - name: 🔍 Lint
        working-directory: backend
        run: npm run lint

      - name: 🔍 npm audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: 🔍 License check
        working-directory: backend
        run: npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0' --excludePrivatePackages

      - name: 🧪 Run tests
        working-directory: backend
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://test:test@localhost:5432/undercity_test
          REDIS_HOST:   localhost
          REDIS_PORT:   6379
        run: npm run test:coverage

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags:     backend
          fail_ci_if_error: false

  # ── Frontend Tests ───────────────────────────────────────
  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: [secret-scan]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint
        working-directory: frontend
        run: npm run lint

      - name: 🔍 npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: 🧪 Run tests
        working-directory: frontend
        run: npm run test

      - name: 🏗️ Build check
        working-directory: frontend
        env:
          VITE_API_URL: https://api.undercity.app/api
        run: npm run build

  # ── Docker Image Scan ─────────────────────────────────────
  trivy-scan:
    name: 🐳 Container Scan
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐳 Build image for scanning
        run: docker build -t undercity-backend:scan ./backend

      - name: 🔍 Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: undercity-backend:scan
          format:    table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity:  CRITICAL,HIGH

  # ── CodeQL Analysis ───────────────────────────────────────
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [secret-scan]
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔬 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries:   security-extended

      - name: 🔬 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ── Deploy Backend (main only) ───────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, trivy-scan, codeql]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐳 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/undercity
            git pull origin main
            cd backend
            npm ci --omit=dev
            npm run build
            npm run migrate
            pm2 restart undercity-backend --update-env
            echo "✅ Backend deployed"
