# ============================================================
# UNDERCITY NGINX CONFIGURATION
# Reverse proxy for backend API
# Frontend served via Cloudflare Pages
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  multi_accept       on;
  worker_connections 65535;
  use                epoll;
}

http {

  # ── Basic Settings ────────────────────────────────────────
  charset               utf-8;
  sendfile              on;
  tcp_nopush            on;
  tcp_nodelay           on;
  server_tokens         off;
  log_not_found         off;
  types_hash_max_size   2048;
  client_max_body_size  100k;

  # ── Timeouts ──────────────────────────────────────────────
  keepalive_timeout     65;
  keepalive_requests    1000;
  send_timeout          30s;
  client_body_timeout   30s;
  client_header_timeout 30s;

  # ── MIME types ────────────────────────────────────────────
  include               mime.types;
  default_type          application/octet-stream;

  # ── Logging ───────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main buffer=512k flush=1m;
  error_log  /var/log/nginx/error.log  warn;

  # ── Gzip ──────────────────────────────────────────────────
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # ── Rate limiting zones ───────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
  limit_req_zone $binary_remote_addr zone=strict:10m   rate=5r/m;

  # ── Connection limiting ───────────────────────────────────
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ── Upstream backend ──────────────────────────────────────
  upstream undercity_backend {
    server 127.0.0.1:5000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name api.undercity.app;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri\;
    }
  }

  # ── HTTPS API Server ──────────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.undercity.app;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.undercity.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.undercity.app/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Connection limit ──────────────────────────────────
    limit_conn addr 20;

    # ── Health check (no rate limit) ──────────────────────
    location /api/health {
      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      access_log off;
    }

    # ── Auth endpoints (strict rate limit) ────────────────
    location ~ ^/api/(v1/)?auth/ {
      limit_req zone=auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Admin endpoints (very strict) ─────────────────────
    location ~ ^/api/(v1/)?admin/ {
      limit_req zone=strict burst=3 nodelay;
      limit_req_status 429;

      # Only allow Cloudflare IPs in production
      # allow 103.21.244.0/22;
      # deny all;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── General API ───────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;

      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;

      # Buffer settings
      proxy_buffering       on;
      proxy_buffer_size     4k;
      proxy_buffers         8 4k;
    }

    # ── 404 for everything else ───────────────────────────
    location / {
      return 404;
    }
  }
}
