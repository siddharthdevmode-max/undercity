worker_processes auto;
worker_rlimit_nofile 65535;

events {
  multi_accept       on;
  worker_connections 65535;
  use                epoll;
}

http {
  charset               utf-8;
  sendfile              on;
  tcp_nopush            on;
  tcp_nodelay           on;
  server_tokens         off;
  log_not_found         off;
  types_hash_max_size   2048;
  client_max_body_size  100k;
  keepalive_timeout     65;
  keepalive_requests    1000;
  send_timeout          30s;
  client_body_timeout   30s;
  client_header_timeout 30s;
  include               mime.types;
  default_type          application/octet-stream;

  map $http_user_agent $bad_bot {
    default           0;
    ~*scrapy          1;
    ~*python-requests 1;
    ~*libwww-perl     1;
    ~*nikto           1;
    ~*sqlmap          1;
    ~*nmap            1;
    ~*masscan         1;
    ~*(zgrab|zgrab2)  1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*hydra           1;
    ~*metasploit      1;
  }

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main buffer=512k flush=1m;
  error_log  /var/log/nginx/error.log  warn;

  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m   rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=strict:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  upstream undercity_backend {
    server undercity_backend:5000;
    keepalive 32;
  }

  # ── DEV SERVER — HTTP only (no SSL until VPS) ─────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name localhost api.undercity.online;

    if ($bad_bot) {
      return 444;
    }

    location /socket.io/ {
      proxy_pass            http://undercity_backend;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    3600s;
      proxy_send_timeout    3600s;
      proxy_connect_timeout 5s;
      proxy_buffering       off;
    }

    location /api/health {
      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log off;
    }

    location ~ ^/api/(v1/)?auth/ {
      limit_req        zone=auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location ~ ^/api/(v1/)?admin/ {
      limit_req        zone=strict burst=3 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req        zone=api burst=20 nodelay;
      limit_req_status 429;

      proxy_pass            http://undercity_backend;
      proxy_http_version    1.1;
      proxy_set_header      Connection        "";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;
      proxy_buffering       on;
      proxy_buffer_size     4k;
      proxy_buffers         8 4k;
    }

    location / {
      return 404;
    }
  }
}
