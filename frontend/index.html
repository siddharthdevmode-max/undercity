<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- ── Primary Meta ── -->
    <title>Undercity — Text-Based Crime MMO</title>
    <meta name="description" content="Build your criminal empire in Undercity. Commit crimes, train stats, join gangs, and dominate the underground in this free browser-based crime MMO." />
    <meta name="keywords" content="crime mmo, browser game, text game, torn city alternative, criminal empire, gang game, free to play" />
    <meta name="author" content="Undercity" />
    <meta name="robots" content="index, follow" />

    <!-- ── PWA ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#dc1f2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Undercity" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://undercity.online/" />
    <meta property="og:title"        content="Undercity — Text-Based Crime MMO" />
    <meta property="og:description"  content="Build your criminal empire. Commit crimes, train stats, join gangs, and dominate the underground. Free forever." />
    <meta property="og:image"        content="https://undercity.online/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="Undercity" />
    <meta property="og:locale"       content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@undercityonline" />
    <meta name="twitter:title"       content="Undercity — Text-Based Crime MMO" />
    <meta name="twitter:description" content="Build your criminal empire. Free browser game. No download required." />
    <meta name="twitter:image"       content="https://undercity.online/og-image.png" />

    <!-- ── Structured Data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Undercity",
      "description": "Free browser-based text crime MMO. Build your criminal empire.",
      "url": "https://undercity.online",
      "genre": ["Role-playing game", "Strategy", "MMO"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "Game",
      "operatingSystem": "Any",
      "inLanguage": "en",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Siddharth"
      }
    }
    </script>

    <!-- ── Icons ── -->
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- ── Performance: Preconnect to external services ── -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.undercity.online" />

    <!-- ── Performance: Preload critical assets ── -->
    <link rel="preload" href="/favicon.svg" as="image" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
