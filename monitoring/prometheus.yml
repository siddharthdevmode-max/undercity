# ============================================================
# PROMETHEUS CONFIG — UNDERCITY
# Scrapes backend /api/health/metrics endpoint
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "undercity-backend"
    static_configs:
      - targets: ["backend:5000"]
    metrics_path: "/api/health/metrics"
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
