# ============================================================
# NGINX PRODUCTION CONFIG — UNDERCITY
# Optimized for global launch
# ============================================================

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/x-javascript
  text/xml
  application/xml
  image/svg+xml
  font/woff
  font/woff2;

# Brotli (if module available)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/javascript application/json image/svg+xml;

server {
  listen 80;
  listen [::]:80;
  server_name undercity.online www.undercity.online;

  # Redirect HTTP → HTTPS
  return 301 https://$host$request_uri\;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name undercity.online www.undercity.online;

  # ── SSL ──────────────────────────────────────────────────
  ssl_certificate     /etc/letsencrypt/live/undercity.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/undercity.online/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  # ── Security Headers ─────────────────────────────────────
  add_header X-Frame-Options           "SAMEORIGIN"   always;
  add_header X-Content-Type-Options    "nosniff"      always;
  add_header X-XSS-Protection          "1; mode=block" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Frontend — static files ───────────────────────────────
  root /var/www/undercity/dist;
  index index.html;

  # Cache hashed assets forever
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
  }

  # Never cache HTML (SPA entry point)
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA — all routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Backend API proxy ─────────────────────────────────────
  location /api/ {
    proxy_pass         http://localhost:5000\;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;

    # No caching for API
    add_header Cache-Control "no-store";
  }

  # ── WebSocket ─────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass         http://localhost:5000\;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 86400s;
  }

  # ── Health check ──────────────────────────────────────────
  location /health {
    proxy_pass http://localhost:5000/api/v1/health\;
  }

  # ── Rate limit zone ───────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  location ~ ^/api/(auth|crimes) {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://localhost:5000\;
  }
}
