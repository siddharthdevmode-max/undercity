# ============================================================
# UNDERCITY — NGINX PRODUCTION CONFIG
# Run: certbot --nginx -d undercity.online -d www.undercity.online
# ============================================================

worker_processes      auto;
worker_rlimit_nofile  65535;

events {
  multi_accept       on;
  # BUG FIX: 65535 per worker was wasteful on a 4GB VPS
  # 4096 per worker is sufficient for 10k concurrent users
  worker_connections 4096;
  use                epoll;
}

http {
  charset               utf-8;
  sendfile              on;
  tcp_nopush            on;
  tcp_nodelay           on;
  server_tokens         off;
  log_not_found         off;
  types_hash_max_size   2048;
  client_max_body_size  100k;
  keepalive_timeout     65;
  keepalive_requests    1000;
  send_timeout          30s;
  client_body_timeout   30s;
  client_header_timeout 30s;
  include               mime.types;
  default_type          application/octet-stream;

  # ── Gzip ───────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   512;
  gzip_comp_level   6;
  gzip_proxied      any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── Bot blocking ───────────────────────────────────────
  map $http_user_agent $bad_bot {
    default           0;
    ~*scrapy          1;
    ~*python-requests 1;
    ~*libwww-perl     1;
    ~*nikto           1;
    ~*sqlmap          1;
    ~*nmap            1;
    ~*masscan         1;
    ~*(zgrab|zgrab2)  1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*hydra           1;
    ~*metasploit      1;
    ""                1;
  }

  # ── Logging ────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main buffer=512k flush=1m;
  error_log  /var/log/nginx/error.log  warn;

  # ── Rate limiting zones ────────────────────────────────
  # BUG FIX: changed from r/m to r/s — more intuitive and
  # allows proper burst configuration for a game API
  limit_req_zone  $binary_remote_addr zone=api:10m    rate=10r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;
  limit_req_zone  $binary_remote_addr zone=strict:10m rate=3r/m;
  # BUG FIX: connection limit zone for WebSocket + API
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ── Upstream ───────────────────────────────────────────
  upstream undercity_backend {
    server undercity_backend:5000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name undercity.online www.undercity.online;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri\;
    }
  }

  # ── HTTPS main server ──────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name undercity.online www.undercity.online;

    ssl_certificate     /etc/letsencrypt/live/undercity.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/undercity.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── CSP for static frontend files ────────────────────
    # API responses get CSP from Helmet (backend)
    # Static HTML/JS/CSS gets CSP from nginx
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self' 'unsafe-inline'; \
       style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
       font-src 'self' https://fonts.gstatic.com; \
       img-src 'self' data: blob:; \
       connect-src 'self' wss://undercity.online https://undercity.online; \
       frame-ancestors 'none';"
      always;

    if ($bad_bot) {
      return 444;
    }

    root  /var/www/undercity/dist;
    index index.html;

    # ── Static asset caching ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header Vary          "Accept-Encoding";
    }

    location = /index.html {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health check ──────────────────────────────────────
    location = /api/health {
      proxy_pass         http://undercity_backend/api/health\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log         off;
    }

    # ── Auth routes ───────────────────────────────────────
    location ~ ^/api/(v1/)?auth/ {
      limit_req        zone=auth burst=3 nodelay;
      limit_req_status 429;
      limit_conn       addr 10;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Admin routes ──────────────────────────────────────
    location ~ ^/api/(v1/)?admin/ {
      limit_req        zone=strict burst=2 nodelay;
      limit_req_status 429;
      limit_conn       addr 5;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── WebSocket ─────────────────────────────────────────
    location /socket.io/ {
      # BUG FIX: connection limit on WebSocket — prevents single IP
      # from opening unlimited long-lived connections
      limit_conn        addr 20;

      proxy_pass            http://undercity_backend\;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    3600s;
      proxy_send_timeout    3600s;
      proxy_connect_timeout 5s;
      proxy_buffering       off;
    }

    # ── General API ───────────────────────────────────────
    location /api/ {
      limit_req        zone=api burst=30 nodelay;
      limit_req_status 429;
      # BUG FIX: connection limit on API
      limit_conn       addr 30;

      proxy_pass            http://undercity_backend\;
      proxy_http_version    1.1;
      proxy_set_header      Connection        "";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;
      proxy_buffering       on;
      proxy_buffer_size     4k;
      proxy_buffers         8 4k;
      add_header            Cache-Control "no-store";
    }

    # ── SPA fallback ──────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
