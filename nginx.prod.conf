worker_processes auto;
worker_rlimit_nofile 65535;

events {
  multi_accept       on;
  worker_connections 65535;
  use                epoll;
}

http {
  charset               utf-8;
  sendfile              on;
  tcp_nopush            on;
  tcp_nodelay           on;
  server_tokens         off;
  log_not_found         off;
  types_hash_max_size   2048;
  client_max_body_size  100k;
  keepalive_timeout     65;
  keepalive_requests    1000;
  send_timeout          30s;
  client_body_timeout   30s;
  client_header_timeout 30s;
  include               mime.types;
  default_type          application/octet-stream;

  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 131.0.72.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 2400:cb00::/32;
  set_real_ip_from 2606:4700::/32;
  set_real_ip_from 2803:f800::/32;
  set_real_ip_from 2405:b500::/32;
  set_real_ip_from 2405:8100::/32;
  set_real_ip_from 2a06:98c0::/29;
  set_real_ip_from 2c0f:f248::/32;
  real_ip_header CF-Connecting-IP;

  map $http_user_agent $bad_bot {
    default           0;
    ~*scrapy          1;
    ~*python-requests 1;
    ~*libwww-perl     1;
    ~*curl        1; # NOTE: blocks curl user-agent. External monitors should use a custom UA.
    ~*wget            1;
    ~*nikto           1;
    ~*sqlmap          1;
    ~*nmap            1;
    ~*masscan         1;
    ~*(zgrab|zgrab2)  1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*hydra           1;
    ~*metasploit      1;
    ""                1;
  }

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time cf_country=$http_cf_ipcountry';

  access_log /var/log/nginx/access.log main buffer=512k flush=1m;
  error_log  /var/log/nginx/error.log  warn;

  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m   rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=strict:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  upstream undercity_backend {
    server undercity_backend:5000;
    keepalive 32;
  }

  server {
    listen      80;
    listen      [::]:80;
    server_name api.undercity.online;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name api.undercity.online;

    ssl_certificate     /etc/letsencrypt/live/api.undercity.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.undercity.online/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_stapling            on;
    ssl_stapling_verify     on;
    ssl_trusted_certificate /etc/letsencrypt/live/api.undercity.online/chain.pem;
    resolver                1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout        5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Request-ID             $request_id always;

    limit_conn addr 20;

    if ($bad_bot) {
      return 444;
    }

    location /socket.io/ {
      proxy_pass            http://undercity_backend;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_set_header      CF-Connecting-IP  $http_cf_connecting_ip;
      proxy_read_timeout    3600s;
      proxy_send_timeout    3600s;
      proxy_connect_timeout 5s;
      proxy_buffering       off;
    }

    location /api/health {
      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log off;
    }

    location ~ ^/api/(v1/)?auth/ {
      limit_req        zone=auth burst=5 nodelay;
      limit_req_status 429;
      add_header       Retry-After 60 always;

      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
      proxy_read_timeout 30s;
    }

    location ~ ^/api/(v1/)?admin/ {
      limit_req        zone=strict burst=3 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req        zone=api burst=20 nodelay;
      limit_req_status 429;
      add_header       Retry-After 60 always;

      proxy_pass            http://undercity_backend;
      proxy_http_version    1.1;
      proxy_set_header      Connection        "";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_set_header      CF-Connecting-IP  $http_cf_connecting_ip;
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;
      proxy_buffering       on;
      proxy_buffer_size     4k;
      proxy_buffers         8 4k;
    }

    location / {
      return 404;
    }
  }
}
