# ============================================================
# UNDERCITY — NGINX PRODUCTION CONFIG
# SWAP_ON_VPS: this file is used when VPS is ready
# Replace undercity.online with your actual domain
# Run: certbot --nginx -d undercity.online -d www.undercity.online
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  multi_accept       on;
  worker_connections 65535;
  use                epoll;
}

http {
  charset               utf-8;
  sendfile              on;
  tcp_nopush            on;
  tcp_nodelay           on;
  server_tokens         off;
  log_not_found         off;
  types_hash_max_size   2048;
  client_max_body_size  100k;
  keepalive_timeout     65;
  keepalive_requests    1000;
  send_timeout          30s;
  client_body_timeout   30s;
  client_header_timeout 30s;
  include               mime.types;
  default_type          application/octet-stream;

  # ── Gzip ───────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_proxied      any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── Bot blocking ───────────────────────────────────────────
  map $http_user_agent $bad_bot {
    default           0;
    ~*scrapy          1;
    ~*python-requests 1;
    ~*libwww-perl     1;
    ~*nikto           1;
    ~*sqlmap          1;
    ~*nmap            1;
    ~*masscan         1;
    ~*(zgrab|zgrab2)  1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*hydra           1;
    ~*metasploit      1;
  }

  # ── Logging ────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main buffer=512k flush=1m;
  error_log  /var/log/nginx/error.log  warn;

  # ── Rate limiting zones (MUST be in http{} context) ────────
  limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m   rate=10r/m;
  limit_req_zone  $binary_remote_addr zone=strict:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ── Upstream ───────────────────────────────────────────────
  upstream undercity_backend {
    server undercity_backend:5000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name undercity.online www.undercity.online;

    # Allow certbot ACME challenge through
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri\;
    }
  }

  # ── HTTPS main server ──────────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name undercity.online www.undercity.online;

    # SWAP_ON_VPS: paths will exist after certbot runs
    ssl_certificate     /etc/letsencrypt/live/undercity.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/undercity.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    if ($bad_bot) {
      return 444;
    }

    # ── Frontend static files ─────────────────────────────────
    # SWAP_ON_VPS: frontend built and placed here by CI/CD
    root  /var/www/undercity/dist;
    index index.html;

    # Cache hashed assets forever (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header Vary          "Accept-Encoding";
    }

    # Never cache HTML — SPA entry point must always be fresh
    location = /index.html {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health check (no rate limit, no log) ─────────────────
    location = /api/health {
      proxy_pass         http://undercity_backend/api/health\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log off;
    }

    # ── Auth routes (strict rate limit) ──────────────────────
    location ~ ^/api/(v1/)?auth/ {
      limit_req        zone=auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Admin routes (strictest rate limit) ──────────────────
    location ~ ^/api/(v1/)?admin/ {
      limit_req        zone=strict burst=3 nodelay;
      limit_req_status 429;

      proxy_pass         http://undercity_backend\;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────
    location /socket.io/ {
      proxy_pass            http://undercity_backend\;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade           $http_upgrade;
      proxy_set_header      Connection        "upgrade";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    3600s;
      proxy_send_timeout    3600s;
      proxy_connect_timeout 5s;
      proxy_buffering       off;
    }

    # ── General API proxy ─────────────────────────────────────
    location /api/ {
      limit_req        zone=api burst=20 nodelay;
      limit_req_status 429;

      proxy_pass            http://undercity_backend\;
      proxy_http_version    1.1;
      proxy_set_header      Connection        "";
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;
      proxy_buffering       on;
      proxy_buffer_size     4k;
      proxy_buffers         8 4k;
      add_header            Cache-Control "no-store";
    }

    # ── SPA fallback — all other routes serve index.html ─────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
